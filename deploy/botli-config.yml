# BotLi config for Wizard 3.0 (Stockfish 18) — complete (all sections BotLi requires).
# Token injected at runtime by deploy/botli-entrypoint.sh from LICHESS_BOT_TOKEN.
# Modeled on the top rated bullet bots: strong engine + book + aggressive matchmaking +
# concurrency + anti-draw play (never offer/accept draws, never resign).

token: "PASTE_YOUR_BOT_TOKEN_HERE"

engines:
  standard:
    dir: "./engines"
    name: "wizard"                     # our Stockfish-18 build (NNUE nets embedded in the binary)
    ponder: true
    silence_stderr: false
    move_overhead_multiplier: 1.0
    uci_options:
      Threads: 2                       # per game; concurrency 2 => 4 threads on a 4-vCPU Railway box
      Hash: 512
      Move Overhead: 100               # low on Railway EU (~15-25ms to Lichess)
    limits:                            # required by BotLi; empty = no early move-calc limits

syzygy:
  standard:
    enabled: false
    paths:
      - "/tb/standard"
    max_pieces: 7
    instant_play: true
  antichess:
    enabled: false
    paths:
      - "/tb/antichess"
    max_pieces: 6
    instant_play: true
  atomic:
    enabled: false
    paths:
      - "/tb/atomic"
    max_pieces: 6
    instant_play: true

gaviota:
  enabled: false
  paths:
    - "/tb/gaviota"
  max_pieces: 5

opening_books:
  enabled: true
  priority: 900
  books:
    standard:
      selection: weighted_random       # variety across good book lines (anti-draw / anti-prep)
      max_depth: 16
      names:
        - MainBook

online_moves:
  opening_explorer:
    enabled: false
    priority: 300
    only_without_book: false
    use_for_variants: false
    allow_repetitions: false
    min_time: 10
    timeout: 5
    min_games: 5
    only_with_wins: false
    selection: "performance"
    anti: false
  lichess_cloud:
    enabled: false
    priority: 200
    only_without_book: false
    use_for_variants: false
    allow_repetitions: false
    trust_eval: false
    min_eval_depth: 10
    min_time: 10
    timeout: 5
  chessdb:
    enabled: false
    priority: 100
    only_without_book: false
    allow_repetitions: false
    trust_eval: false
    min_time: 10
    timeout: 5
    best_move: false
  online_egtb:
    enabled: false
    min_time: 5
    timeout: 3

offer_draw:
  enabled: false                       # never offer/accept draws — play on (attacks draw-death)
  score: 10
  consecutive_moves: 5
  min_game_length: 30
  against_humans: true

resign:
  enabled: false                       # never resign — make the opponent prove the win
  score: -1000
  consecutive_moves: 5
  against_humans: true

challenge:
  concurrency: 2                       # two rated games at once = faster grind (Railway 4 vCPU)
  max_takebacks: 3
  human:
    bullet_with_increment_only: false
    variants:
      - standard
    time_controls:
      - bullet
      - blitz
    modes:
      - rated
  bot:
    bullet_with_increment_only: false
    variants:
      - standard
    time_controls:
      - bullet
      - blitz
    modes:
      - rated

matchmaking:
  delay: 10                            # seconds idle before seeking a game — aggressive (default is 480)
  timeout: 30                          # cancel a challenge after 30s if not accepted
  selection: cyclic                    # cycle through the opponent pool constantly
  types:
    bullet:
      tc: 1+0                          # decisive bullet (no increment -> opponents flag/blunder -> draws become wins)
      rated: true
      variant: standard
      min_rating_diff: -250            # play down to 250 below us (beatable, decisive wins)
      max_rating_diff: 50              # draws vs higher bots gain ~nothing; don't feed the cap to them
      target_rating_diff: -80          # aim below our rating where wins are possible

messages:
  greeting: ""
  goodbye: ""
  greeting_spectators: ""
  goodbye_spectators: ""

whitelist:

# Chronic draw partners (SF-derivative bots we've NEVER beaten — every game vs them is a
# draw, which wastes the 100 bot-games/day cap and bleeds rating when they're rated below us).
# Wins only come from non-SF engines that flag at 1+0, so keep the pool pointed at those.
blacklist:
  - BOT_Stockfish13
  - Classic_BOT-v2
  - ClassicLegendBot_v2
  - codabot
  - BlueMoonBot
  - Moment-That-Inspires
  - ToromBot
  - PiFishBob
  - CookieCompote28
  - ZaaVeeRRR
  - chessbot2880
  - PumpkinBotLite
  - RubiChessDemolisher
  - Obsidian-Demolisher

online_blacklists:

books:
  MainBook: "./engines/book.bin"
