# lichess-bot configuration for the Wizard 3.0 engine — tuned for BULLET rating climb.
# Wizard 3.0 is a Stockfish-18 derivative (GPL-3); NNUE nets are embedded in the
# binary. Paths are the container layout produced by the Dockerfile (/app/engine/...).

token: "PASTE_YOUR_BOT_TOKEN_HERE"     # Lichess BOT token with bot:play scope (injected by entrypoint)
url: "https://lichess.org/"

engine:
  dir: "/app/engine/wizard"            # folder holding the `wizard` binary
  working_dir: "/app/engine"
  name: "wizard"                       # the binary produced by `make` in wizard/
  protocol: "uci"
  ponder: true                         # think on the opponent's clock — a real bullet-rating win

  uci_options:
    Threads: 4                         # all Railway vCPUs — the entrypoint auto-detects nproc and overrides this
    Hash: 512                          # MB (Railway has the RAM)
    Move Overhead: 100                 # ms; low on Railway EU (~15-25ms to Lichess) — reclaims think time vs the old 150
    # Stockfish 18 always uses NNUE (nets embedded); no Use NNUE / EvalFile / OwnBook engine options.

  # Anti-draw opening book — played by the lichess-bot BRIDGE (engine-independent) before the
  # engine sees the position. Steers into varied, imbalanced-but-sound lines to cut the
  # engine-vs-engine draw rate that pins the rating. Book downloaded by the Dockerfile.
  polyglot:
    enabled: true
    book:
      standard:
        - "/app/engine/book/komodo.bin"
    min_weight: 1
    selection: "weighted_random"       # variety > always-best: avoids the same drawish mainlines every game
    max_depth: 8                        # book only the first ~8 plies, then hand to the engine

# --- Seek games actively (drives the rating climb) ---
matchmaking:
  allow_matchmaking: true
  challenge_variant: "standard"
  challenge_timecontrol: "bullet"      # bullet: engines overperform most (opponents flag/blunder)
  challenge_initial_time: 60           # 1+1 bullet
  challenge_increment: 1               # +1s/move: neutralizes runner->Lichess latency
  challenge_mode: "rated"
  # Balanced climbing band for the stronger SF17 engine: floor a bit below rating so
  # there are decisive-win games, ceiling near/above the 3100 target. (opponent_rating_difference
  # left UNSET on purpose — setting it makes lichess-bot ignore this band.)
  opponent_min_rating: 2850            # decisive band: high enough to gain real points...
  opponent_max_rating: 3080            # ...ceiling at/just-below our rating so most games are winnable (not draw-bled)
  challenge_timeout: 5                 # minutes idle before seeking a game

# --- Accept incoming challenges (in-band) ---
challenge:
  concurrency: 1                       # one game at a time (single instance)
  sort_by: "best"
  accept_bot: true
  only_bot: false
  max_increment: 10
  min_increment: 0
  max_base: 300
  min_base: 60
  variants:
    - standard
  time_controls:
    - bullet
    - blitz
  modes:
    - rated

# Misc
abort_time: 20
rate_limiting_delay: 0
greeting:
  hello: ""
  goodbye: ""

pgn_directory: "game_records"
