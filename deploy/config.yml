# lichess-bot configuration for the Wizard engine — tuned for BULLET rating climb.
# Wizard is a Stockfish-15.1 derivative (GPL-3) with an integrated Polyglot book.
# Paths are the container layout produced by the Dockerfile (/app/engine/...).

token: "PASTE_YOUR_BOT_TOKEN_HERE"     # Lichess BOT token with bot:play scope (injected by entrypoint)
url: "https://lichess.org/"

engine:
  dir: "/app/engine/wizard"            # folder holding the `wizard` binary
  working_dir: "/app/engine"           # so relative book/ paths resolve
  name: "wizard"                       # the binary produced by `make` in wizard/
  protocol: "uci"
  ponder: true                         # think on the opponent's clock — a real bullet-rating win

  uci_options:
    Threads: 3                         # runner has ~4 vCPU; 3 for the engine, 1 for bridge/OS
    Hash: 256                          # MB
    Move Overhead: 400                 # ms; KEEP high for bullet — latency flag-safety outweighs the clock cost
    Use NNUE: true                     # NNUE net is embedded in the binary (nn-ad9b42354671.nnue)
    OwnBook: true                      # Wizard plays Polyglot book moves in the opening (our integration)
    BookFile: "book/komodo.bin"        # relative to working_dir (downloaded by the Dockerfile)
    BookBestMove: false                # weighted-random among good book moves (opening variety)

# --- Seek games actively (drives the rating climb) ---
matchmaking:
  allow_matchmaking: true
  challenge_variant: "standard"
  challenge_timecontrol: "bullet"      # bullet: engines overperform most (opponents flag/blunder)
  challenge_initial_time: 60           # 1+1 bullet
  challenge_increment: 1               # +1s/move: neutralizes runner->Lichess latency
  challenge_mode: "rated"
  # Bias matchmaking UPWARD: floor at/above the bot's own rating (skip weaker bots)
  # with headroom past the 3100 target. NOTE: opponent_rating_difference is left
  # UNSET on purpose — setting it makes lichess-bot ignore this band.
  opponent_min_rating: 2600            # never play below this
  opponent_max_rating: 3300            # up to well above the 3100 goal
  challenge_timeout: 5                 # minutes idle before seeking a game

# --- Accept incoming challenges (in-band) ---
challenge:
  concurrency: 1                       # one game at a time (single instance)
  sort_by: "best"
  accept_bot: true
  only_bot: false
  max_increment: 10
  min_increment: 0
  max_base: 300                        # up to 5 min base
  min_base: 60                         # >= 1 min base so we accept bullet challenges too
  variants:
    - standard
  time_controls:
    - bullet
    - blitz
  modes:
    - rated

# Misc
abort_time: 20                         # seconds to wait before aborting a stalled game
rate_limiting_delay: 0
greeting:
  hello: ""                            # keep quiet (no chat spam)
  goodbye: ""

pgn_directory: "game_records"          # save played games for later analysis
