# Runs Wizard 3.0 (Stockfish 18) under the BotLi framework on GitHub Actions.
#
# Continuous-handoff design (GitHub caps jobs at 6h): timeout 350 (~5h50m) + a 5h cron
# relaunch; concurrency queues the next run. Requires a PUBLIC repo for free minutes.
# NOTE: a job that ends mid-game abandons that game — so concurrency is forced to 1 here
# (fewer abandoned games per relaunch) and the increment time control (1+1) is used because
# GitHub runners are in US Azure (~90ms to Lichess in France) and 1+0 would flag.
name: lichess-bot

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: lichess-bot
  cancel-in-progress: false

jobs:
  play:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ make python3 python3-pip curl
          python3 -m pip install --quiet uv

      - name: Build Wizard 3.0 (Stockfish 18) + self-test
        run: |
          cd wizard
          make -j profile-build ARCH=x86-64-bmi2 COMP=gcc   # PGO; bmi2 is fine on Actions runners
          ./wizard bench 2>&1 | tail -3

      - name: Set up BotLi (engine binary + opening book)
        run: |
          git clone --depth 1 https://github.com/Torom/BotLi.git ../botli
          cd ../botli
          uv sync || python3 -m pip install --quiet -r requirements.txt || true
          mkdir -p engines
          cp "${GITHUB_WORKSPACE}/wizard/wizard" engines/wizard
          chmod +x engines/wizard
          curl -L --fail --retry 3 -o engines/book.bin \
            "https://raw.githubusercontent.com/michaeldv/donna_opening_books/master/komodo.bin"

      - name: Configure BotLi (token + Actions-safe overrides)
        env:
          BOT_TOKEN: ${{ secrets.LICHESS_BOT_TOKEN }}
        run: |
          test -n "${BOT_TOKEN}" || { echo "LICHESS_BOT_TOKEN secret is not set"; exit 1; }
          cp deploy/botli-config.yml ../botli/config.yml
          cd ../botli
          sed -i "s|PASTE_YOUR_BOT_TOKEN_HERE|${BOT_TOKEN}|" config.yml
          sed -i "s|tc: 1+0|tc: 1+1|" config.yml                         # US runner -> Lichess(FR) latency: keep the increment
          sed -i "s|Move Overhead: [0-9]*|Move Overhead: 150|" config.yml # higher margin for ~90ms latency
          sed -i "s|concurrency: 2|concurrency: 1|" config.yml            # fewer abandoned games when the 6h job ends

      - name: Run BotLi until job timeout
        working-directory: ../botli
        run: |
          if [ -d .venv ]; then uv run user_interface.py matchmaking; else python3 user_interface.py matchmaking; fi
