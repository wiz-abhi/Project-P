# Runs the chess engine as a Lichess bot on GitHub Actions.
#
# GitHub Actions caveats this design works around:
#  * Jobs are killed at 6h  -> timeout-minutes 350 (5h50m), and a cron relaunch.
#  * Cron is unreliable/delayed -> concurrency queues the next run so as one job
#    ends the queued one starts (near-seamless handoff); gaps self-heal and cost
#    no rating (an idle Lichess bot is not penalized).
#  * Free minutes -> REQUIRES A PUBLIC REPO (public repos get free standard runners).
#  * ToS: Actions is meant for CI/CD, not persistent services — this is a gray area.
#
# Setup (see deploy/GITHUB_ACTIONS.md):
#  1. Make the repo PUBLIC.
#  2. Add a repository secret LICHESS_BOT_TOKEN (a Lichess BOT token, bot:play scope).
#  3. Enable Actions, then run this workflow once from the Actions tab (workflow_dispatch).
name: lichess-bot

on:
  workflow_dispatch: {}          # manual start / restart
  schedule:
    - cron: "0 */5 * * *"        # every 5h; with the 5h50m job timeout this hands off continuously

# Only one bot instance at a time; do NOT cancel a running bot when a new schedule
# fires — let it queue and take over when the current job times out.
concurrency:
  group: lichess-bot
  cancel-in-progress: false

jobs:
  play:
    runs-on: ubuntu-latest
    timeout-minutes: 350         # ~5h50m, safely under the 6h hard cap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ make python3 python3-pip python3-venv
          g++ --version | head -1

      - name: Build engine + perft self-test
        run: |
          make
          ./bin/engine perft | tail -1        # must print ALL POSITIONS PASS

      - name: Fetch NNUE net (git-ignored, so download at run time)
        run: |
          mkdir -p nets
          if [ ! -s nets/nn-halfkp.nnue ]; then
            curl -L --fail --retry 3 -o nets/nn-halfkp.nnue \
              "https://tests.stockfishchess.org/api/nn/nn-62ef826d1a6d.nnue"
          fi
          printf 'uci\nquit\n' | ./bin/engine | grep -i "NNUE loaded" || (echo "NNUE net missing"; exit 1)

      - name: Install lichess-bot
        run: |
          git clone --depth 1 https://github.com/lichess-bot-devs/lichess-bot.git ../lichess-bot
          python3 -m pip install --quiet -r ../lichess-bot/requirements.txt

      - name: Configure lichess-bot
        env:
          BOT_TOKEN: ${{ secrets.LICHESS_BOT_TOKEN }}
        run: |
          cp deploy/config.yml ../lichess-bot/config.yml
          cd ../lichess-bot
          # Point at the engine in this checkout, and inject the token (GitHub masks it in logs).
          sed -i "s|PASTE_YOUR_BOT_TOKEN_HERE|${BOT_TOKEN}|" config.yml
          sed -i "s|dir: \"/home/user/engine/bin\"|dir: \"${GITHUB_WORKSPACE}/bin\"|" config.yml
          sed -i "s|working_dir: \"/home/user/engine\"|working_dir: \"${GITHUB_WORKSPACE}\"|" config.yml
          test -n "${BOT_TOKEN}" || (echo "LICHESS_BOT_TOKEN secret is not set"; exit 1)

      - name: Run bot until job timeout
        working-directory: ../lichess-bot
        run: python3 lichess-bot.py
