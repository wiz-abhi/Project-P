# Runs Wizard 2.0 (Stockfish 17.1 derivative) as a Lichess bot on GitHub Actions.
#
# Continuous-handoff design (GitHub caps jobs at 6h): timeout-minutes 350 (~5h50m)
# + a 5h cron relaunch; concurrency queues the next run so it takes over as one ends.
# Requires a PUBLIC repo for free runner minutes.
#
# Setup:
#  1. Make the repo PUBLIC.
#  2. Add a repository secret LICHESS_BOT_TOKEN (a Lichess BOT token, bot:play scope).
#  3. Actions tab -> run "lichess-bot" (workflow_dispatch).
name: lichess-bot

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: lichess-bot
  cancel-in-progress: false

jobs:
  play:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ make python3 python3-pip python3-venv curl
          g++ --version | head -1

      - name: Build Wizard 2.0 (embeds NNUE nets) + self-test
        run: |
          cd wizard
          # profile-build = PGO (self-benches, recompiles with the profile) ~= +20-40 Elo free NPS.
          # bmi2 (PEXT magic bitboards) is faster than avx2 on the Ice Lake/EPYC Actions runners.
          make -j profile-build ARCH=x86-64-bmi2 COMP=gcc   # uses ../scripts/net.sh to fetch+embed nets
          ./wizard bench 2>&1 | tail -3                     # must print "Nodes searched"

      - name: Install lichess-bot
        run: |
          git clone --depth 1 https://github.com/lichess-bot-devs/lichess-bot.git ../lichess-bot
          python3 -m pip install --quiet -r ../lichess-bot/requirements.txt

      - name: Configure lichess-bot
        env:
          BOT_TOKEN: ${{ secrets.LICHESS_BOT_TOKEN }}
        run: |
          test -n "${BOT_TOKEN}" || { echo "LICHESS_BOT_TOKEN secret is not set"; exit 1; }
          cp deploy/config.yml ../lichess-bot/config.yml
          cd ../lichess-bot
          sed -i "s|PASTE_YOUR_BOT_TOKEN_HERE|${BOT_TOKEN}|" config.yml
          sed -i "s|/app/engine/wizard|${GITHUB_WORKSPACE}/wizard|" config.yml
          sed -i "s|/app/engine|${GITHUB_WORKSPACE}|" config.yml
          sed -i "s|Threads: 3|Threads: 4|" config.yml     # public-repo runners are 4 vCPU (use all of them)

      - name: Run bot until job timeout
        working-directory: ../lichess-bot
        run: python3 lichess-bot.py
